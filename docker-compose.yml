services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      # host:container mapping; allow overriding via env
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -h localhost",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # use default CMD from Dockerfile (node dist/app.js) so we avoid fastify-cli issues
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/postgres"
      PORT: "${BACKEND_PORT:-4000}"
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      PORT: "${FRONTEND_PORT:-3000}"
      BACKEND_URL: "http://backend:4000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
